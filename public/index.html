<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FitDeck</title><script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#090b12;--panel:#121826;--line:#ffffff17;--text:#f8fafc;--muted:#94a3b8;--accent:#ff6577}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px Inter,system-ui,sans-serif;min-height:100vh}button,input,select{font:inherit}button{cursor:pointer;border:0}.hide{display:none!important}.shell{max-width:680px;margin:auto;padding:16px 16px 90px}.top{display:flex;align-items:center;justify-content:space-between;margin:8px 0 20px}.logo{font-size:28px;font-weight:950;letter-spacing:-1.8px}.logo em{color:var(--accent);font-style:normal}.avatar,.close{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#ffd277,#ff6376);color:#1d1220;font-weight:950}.panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:17px;box-shadow:0 18px 45px #0003}.hero{background:radial-gradient(circle at 90% 0,#ff527144,transparent 38%),linear-gradient(135deg,#20223e,#0d1018);padding:25px}.eyebrow{color:var(--muted);font-size:10px;letter-spacing:1.4px;font-weight:900;text-transform:uppercase}.hero h1{font-size:38px;line-height:.94;letter-spacing:-2px;margin:10px 0}.muted{color:var(--muted);line-height:1.5}.games{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:13px 0}.game{min-height:142px;color:white;text-align:left;border-radius:21px;padding:16px;position:relative;overflow:hidden}.game:after{content:"";position:absolute;width:112px;height:112px;border:1px solid #fff3;border-radius:50%;right:-30px;bottom:-40px}.game b,.game span{position:relative;z-index:1;display:block}.game b{font-size:20px}.game span{font-size:11px;opacity:.76;margin-top:6px}.death{background:linear-gradient(145deg,#281121,#8a2444)}.lethal{background:linear-gradient(145deg,#16141b,#821725)}.royal{background:linear-gradient(145deg,#302111,#896234)}.golf{background:linear-gradient(145deg,#10412f,#19714a)}.tabs{display:flex;gap:8px;margin:14px 0}.tabs button{flex:1;padding:10px;border-radius:13px;background:#0d121e;color:var(--muted);border:1px solid var(--line);font-weight:800}.tabs .active{background:#f8fafc;color:#0f172a}.form{display:grid;gap:10px}.form input,.form select{background:#0b101b;border:1px solid var(--line);border-radius:14px;color:white;padding:13px;width:100%}.primary{background:linear-gradient(135deg,#ff6478,#ffad6a);padding:13px;border-radius:14px;color:#24131a;font-weight:950}.secondary{background:#1b2332;border:1px solid var(--line);color:white;padding:11px;border-radius:13px;font-weight:800}.notice{color:#eacb86;font-size:12px;line-height:1.45}.theme-golf{--accent:#f2cd72;background:repeating-linear-gradient(135deg,#083723 0 10px,#0b422a 10px 20px)}.theme-lethalcross{--accent:#ff4056;background:#10090c}.theme-deathbox{--accent:#ff5570}.theme-asshole{--accent:#e9be66;background:#191108}.room-head{display:flex;justify-content:space-between;align-items:center}.turn{font-size:24px;font-weight:950;margin-top:5px}.chip{font-size:11px;background:#ffffff16;padding:7px 10px;border-radius:999px}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.card-btn{background:transparent;padding:0}.card{position:relative;width:100%;aspect-ratio:2.45/3.5;background:#fffef8;color:#151515;border-radius:13px;border:2px solid white;padding:8px;box-shadow:0 9px 18px #0005}.card.red{color:#c72e42}.rank{font-size:20px;font-weight:950;line-height:.8}.suit{font-size:14px}.big{position:absolute;inset:0;display:grid;place-items:center;font-size:46px}.back{background:repeating-linear-gradient(45deg,#0c6845 0 6px,#0e573e 6px 12px);color:#fff}.back:after{content:"âš‘";position:absolute;inset:6px;border:1px solid #fff9;border-radius:8px;display:grid;place-items:center;font-size:26px}.theme-deathbox .back{background:repeating-linear-gradient(45deg,#310f20 0 6px,#721d3b 6px 12px)}.theme-lethalcross .back{background:linear-gradient(135deg,#1b080c,#a21c2e)}.theme-asshole .back{background:linear-gradient(135deg,#2d1b0c,#9c6c37)}.actions,.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.choices button{background:#1b2534;border-radius:15px;color:white;padding:14px;font-weight:950}.status{margin:12px 0;padding:13px;background:#131c2b;border-radius:15px;color:#cbd5e1}.score{overflow:auto;background:#fffef7;color:#183526;border-radius:18px;margin:12px 0}.score table{border-collapse:collapse;min-width:570px;width:100%;font-size:11px}.score th,.score td{padding:9px;border-bottom:1px solid #ddd;text-align:center}.score th{background:#edcf78}.score td:first-child,.score th:first-child{text-align:left}.golf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.hand{display:grid;grid-template-columns:1fr 1fr;gap:7px}.draw{padding:14px;border-radius:15px;background:#efd27c;color:#153124;font-weight:950}.discard{background:#fffef8;padding:7px;border-radius:15px}.modal{position:fixed;inset:0;background:#02050bbd;backdrop-filter:blur(10px);z-index:8;padding:14px;display:grid;place-items:center}.modal-card{width:min(620px,100%);max-height:92vh;overflow:auto;position:relative}.modal-top{display:flex;justify-content:space-between;align-items:center}.profile-head{display:flex;gap:13px;align-items:center}.big-avatar{width:62px;height:62px;border-radius:20px;background:linear-gradient(135deg,#ffd277,#ff6376);color:#20131b;display:grid;place-items:center;font-weight:950;font-size:24px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:15px 0}.metric{background:#0d121d;border-radius:14px;padding:11px}.metric small{display:block;color:var(--muted);font-size:9px;text-transform:uppercase}.metric b{font-size:20px}.chart{height:115px;display:flex;align-items:end;gap:7px;padding:12px 0}.chart i{flex:1;background:linear-gradient(#ff6a80,#7350cf);border-radius:8px 8px 2px 2px;min-height:8px}.history{display:grid;gap:8px}.history div{background:#0d121d;padding:12px;border-radius:13px;display:flex;justify-content:space-between;font-size:12px}.empty{color:var(--muted);padding:16px 0}.auth{max-width:430px;margin:12vh auto}.bottom{position:fixed;bottom:0;left:0;right:0;padding:12px;background:#0c1019ed;border-top:1px solid var(--line);display:flex;justify-content:center;gap:42px}.bottom button{background:transparent;color:var(--muted);font-weight:800}@media(max-width:390px){.shell{padding:12px}.game{min-height:120px;padding:13px}}
</style></head><body><main class="shell" id="app"></main><nav class="bottom hide" id="bottom"><button data-view="home">Games</button><button data-view="profile">Profile</button></nav>
<script>
const app=document.querySelector('#app'),bottom=document.querySelector('#bottom'),q=s=>document.querySelector(s),tokenKey='fitdeck-token';let socket,profile=null,state=null,myId=null,view='home',selectedGame='deathbox',createMode=true,openAfterSignup=false;
const safe=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function c(card,back=false){if(back||!card?.faceUp)return '<div class="card back"></div>';let red=card.color==='red'||card.suit==='â™¥'||card.suit==='â™¦',suit=card.symbol||card.suit||'â™ ';return '<div class="card '+(red?'red':'')+'"><div class="rank">'+safe(card.rank||card.label)+'</div><div class="suit">'+suit+'</div><div class="big">'+suit+'</div></div>'}
function auth(){return '<section class="panel auth"><div class="eyebrow">Welcome to FitDeck</div><h1 style="font-size:34px;margin:8px 0">Create your player.</h1><p class="muted">Your player name, history, stats, and progression live in your profile.</p><form class="form" id="authForm" style="margin-top:16px"><input id="username" minlength="3" maxlength="18" placeholder="Username" required><input id="passcode" inputmode="numeric" pattern="\\d{6}" placeholder="6-digit passcode" required><button class="primary" id="signup">Create player</button><button type="button" class="secondary" id="login">I already have an account</button></form><p class="notice">New players automatically open their profile after sign-up.</p></section>'}
function home(){let name=profile?.name||'Player';return '<header class="top"><div class="logo">fit<em>deck</em></div><button class="avatar" id="avatar">'+safe(name[0])+'</button></header><section class="panel hero"><div class="eyebrow">Simple games. Serious style.</div><h1>Choose the table.</h1><p class="muted">Every game has its own visual world, themed cards, and clear controls built for phones.</p></section><section class="games"><button class="game death" data-game="deathbox"><b>Deathbox</b><span>Neon hazard cards</span></button><button class="game lethal" data-game="lethalcross"><b>LethalCross</b><span>Sharp red-line co-op</span></button><button class="game royal" data-game="asshole"><b>Asshole</b><span>Premium tavern deck</span></button><button class="game golf" data-game="golf"><b>Golf</b><span>Fairway tournament</span></button></section><section class="panel"><div class="tabs"><button id="make" class="'+(createMode?'active':'')+'">Create</button><button id="join" class="'+(!createMode?'active':'')+'">Join</button></div><form class="form" id="roomForm"><input id="name" value="'+safe(name)+'" placeholder="Display name" required><input id="roomCode" class="'+(createMode?'hide':'')+'" maxlength="5" placeholder="Room code"><select id="holes" class="'+(selectedGame==='golf'?'':'hide')+'"><option value="6">6-hole tournament</option><option value="9" selected>9-hole tournament</option><option value="18">18-hole tournament</option></select><button class="primary">'+(createMode?'Create room':'Join room')+'</button><div class="notice" id="note">'+(selectedGame==='golf'?'Golf is online only: 4â€“6 players, 6/9/18 holes, XP after a naturally completed tournament.':'Select a game, create a private room, then share the code.')+'</div></form></section>'}
function profileModal(){let s=profile?.stats||{},x=profile?.xp||{},games=profile?.games||[],acc=s.guesses?Math.round(s.correct*100/s.guesses):0;return '<div class="modal" id="modal"><section class="panel modal-card"><div class="modal-top"><div class="logo">Player profile</div><button class="close" id="closeProfile">Ã—</button></div><div class="profile-head" style="margin-top:16px"><div class="big-avatar">'+safe((profile?.name||'P')[0])+'</div><div><h2>'+safe(profile?.name||'Player')+'</h2><p class="muted">Level '+(x.level||1)+' Â· '+safe(x.rank||'Amateur')+'</p></div></div><div class="metrics"><div class="metric"><small>Lifetime XP</small><b>'+Number(x.total||0).toLocaleString()+'</b></div><div class="metric"><small>Games</small><b>'+(s.games||0)+'</b></div><div class="metric"><small>Accuracy</small><b>'+acc+'%</b></div></div><div class="tabs"><button class="active" data-profile-tab="overview">Overview</button><button data-profile-tab="charts">Charts</button><button data-profile-tab="history">History</button></div><div id="profileTab"><p class="muted">Your dashboard keeps your level, completed games, accuracy, risk, drinks, and saved history in one simple place.</p></div></section></div>'}
function score(g){let h=g.holes||9,rows=state.players.map((p,i)=>{let a=g.scores[i]||[],t=a.reduce((x,y)=>x+y,0),r=t-a.length*4;return '<tr><td>'+safe(p.name)+'</td>'+Array.from({length:h},(_,j)=>'<td>'+(a[j]??'â€“')+'</td>').join('')+'<td>'+(r===0?'E':r>0?'+'+r:r)+'</td><td>'+(t||'â€“')+'</td><td>'+(g.drinks[i]||0)+'</td></tr>'}).join('');return '<div class="score"><table><thead><tr><th>Player</th>'+Array.from({length:h},(_,j)=>'<th>'+ (j+1)+'</th>').join('')+'<th>Par</th><th>Total</th><th>Drinks</th></tr></thead><tbody>'+rows+'</tbody></table></div>'}
function golfGame(){let g=state.golf,me=state.players.findIndex(p=>p.id===myId),mine=g.hands[me]||[],turn=state.currentPlayerId===myId;return score(g)+'<section class="panel"><div class="room-head"><div><div class="eyebrow">Hole '+g.hole+' of '+g.holes+'</div><div class="turn">â›³ '+safe(state.players[g.turn]?.name||'Player')+'</div></div><span class="chip">'+(turn?'Your turn':'Watching')+'</span></div><div class="golf-grid" style="margin-top:14px"><div><div class="eyebrow">Your box</div><div class="hand">'+mine.map((z,i)=>'<button class="card-btn" data-swap="'+i+'" '+(!turn||!g.drawn?'disabled':'')+'>'+c(z,!z.faceUp)+'</button>').join('')+'</div></div><div><div class="eyebrow">Center</div><div class="actions"><button class="draw" data-draw="deck" '+(!turn||g.drawn?'disabled':'')+'>Draw deck<br><small>'+g.deckCount+' cards</small></button><button class="discard" data-draw="discard" '+(!turn||g.drawn?'disabled':'')+'>'+c(g.discard,false)+'</button></div>'+(g.drawn?'<div class="eyebrow" style="margin-top:10px">Drawn card</div>'+c({...g.drawn,faceUp:true})+'<button class="secondary" id="discardDraw" style="width:100%;margin-top:7px">Discard drawn card</button>':'')+'</div></div></section>'}
function standardGame(){let turn=state.currentPlayerId===myId;return '<section class="panel"><div class="room-head"><div><div class="eyebrow">Live game</div><div class="turn">'+safe(state.players[state.turn]?.name||'Player')+'</div></div><span class="chip">'+(turn?'Your turn':'Watching')+'</span></div><div class="board" style="margin-top:14px">'+state.piles.map((p,i)=>'<button class="card-btn" data-pile="'+i+'" '+(!turn?'disabled':'')+'>'+c(p.top,!p.top)+'</button>').join('')+'</div><div class="choices"><button id="lower">â†“ Lower</button><button id="higher">â†‘ Higher</button></div></section>'}
function game(){let t='theme-'+(state.game==='golf'?'golf':state.game==='lethalcross'?'lethalcross':state.game==='asshole'?'asshole':'deathbox'),title=state.game==='golf'?'Greenline Golf':state.game==='lethalcross'?'LethalCross':state.game==='asshole'?'The Tavern':'Deathbox',host=state.hostId===myId;return '<div class="'+t+'"><header class="top"><button class="secondary" id="back">â† Games</button><div class="logo">'+title+'</div></header>'+(!state.started?'<section class="panel"><div class="eyebrow">Private room '+state.code+'</div><h2 style="margin:7px 0">Waiting for players</h2><p class="muted">'+(state.game==='golf'?'Golf needs 4â€“6 total players.':'Share your room code, then start when ready.')+'</p>'+(host?'<button class="primary" id="start" style="width:100%;margin-top:14px">Start game</button>':'')+'</section>':state.game==='golf'?golfGame():standardGame())+'<div class="status">'+safe(state.result||'Waiting for game updates.')+'</div><div class="actions"><button class="secondary" id="help">Instructions</button><button class="secondary" id="cancel">Quit & Cancel</button><button class="primary" id="finish">Save & Finish</button></div></div>'}
function render(){bottom.classList.toggle('hide',!profile);app.innerHTML=!profile?auth():view==='game'&&state?game():home();bind();if(profile&&openAfterSignup){openAfterSignup=false;showProfile()}}
function showProfile(){document.body.insertAdjacentHTML('beforeend',profileModal());q('#closeProfile').onclick=()=>q('#modal').remove();document.querySelectorAll('[data-profile-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-profile-tab]').forEach(x=>x.classList.toggle('active',x===b));let g=profile.games||[],box=q('#profileTab');if(b.dataset.profileTab==='charts')box.innerHTML='<div class="chart">'+(g.slice(0,8).reverse().map((x,i)=>'<i style="height:'+Math.min(100,18+(x.correct||0)*11)+'%"></i>').join('')||'<p class="empty">Play a completed game to chart your performance.</p>')+'</div>';else if(b.dataset.profileTab==='history')box.innerHTML='<div class="history">'+(g.map(x=>'<div><b>'+safe(x.game||'Game')+'</b><span>'+safe(x.status||'saved')+' Â· +'+(x.xpEarned||0)+' XP</span></div>').join('')||'<p class="empty">No saved games yet.</p>')+'</div>';else box.innerHTML='<p class="muted">Your dashboard updates whenever a match is saved or naturally completed.</p>'})}
function bind(){if(q('#signup')){q('#signup').onclick=e=>{e.preventDefault();openAfterSignup=true;socket.emit('createAccount',{username:q('#username').value,passcode:q('#passcode').value})};q('#login').onclick=()=>socket.emit('loginAccount',{username:q('#username').value,passcode:q('#passcode').value})}if(q('#avatar'))q('#avatar').onclick=showProfile;document.querySelectorAll('[data-game]').forEach(b=>b.onclick=()=>{selectedGame=b.dataset.game;render()});if(q('#make')){q('#make').onclick=()=>{createMode=true;render()};q('#join').onclick=()=>{createMode=false;render()};q('#roomForm').onsubmit=e=>{e.preventDefault();if(createMode)socket.emit('createRoom',{name:q('#name').value,game:selectedGame,golfHoles:q('#holes').value,difficulty:'normal',profileToken:profile.token});else socket.emit('joinRoom',{name:q('#name').value,code:q('#roomCode').value,profileToken:profile.token})}}if(q('#back'))q('#back').onclick=()=>{socket.emit('newGame');view='home'};if(q('#start'))q('#start').onclick=()=>socket.emit('startGame');if(q('#lower'))q('#lower').onclick=()=>socket.emit('choose','lower');if(q('#higher'))q('#higher').onclick=()=>socket.emit('choose','higher');document.querySelectorAll('[data-pile]').forEach(b=>b.onclick=()=>socket.emit('selectPile',+b.dataset.pile));document.querySelectorAll('[data-draw]').forEach(b=>b.onclick=()=>socket.emit('golfDraw',b.dataset.draw));document.querySelectorAll('[data-swap]').forEach(b=>b.onclick=()=>socket.emit('golfSwap',+b.dataset.swap));if(q('#discardDraw'))q('#discardDraw').onclick=()=>socket.emit('golfDiscard');if(q('#finish'))q('#finish').onclick=()=>confirm('Save and finish this game?')&&socket.emit('saveAndFinish');if(q('#cancel'))q('#cancel').onclick=()=>confirm('Cancel this game and remove its XP and history?')&&socket.emit('quitAndCancel');if(q('#help'))q('#help').onclick=()=>alert(state.game==='golf'?'Draw from deck or discard, swap into your box or discard it. Lowest score wins each par-4 hole.':'Choose a pile and make your call.')}
bottom.onclick=e=>{if(e.target.dataset.view){view=e.target.dataset.view;render();if(view==='profile')showProfile()}};socket=io();socket.on('connect',()=>{let t=localStorage.getItem(tokenKey);if(t)socket.emit('profileLogin',{token:t})});socket.on('profileReady',p=>{profile=p;localStorage.setItem(tokenKey,p.token);render()});socket.on('authRequired',()=>{profile=null;localStorage.removeItem(tokenKey);render()});socket.on('roomJoined',x=>{myId=x.playerId;state=x.room;view='game';render()});socket.on('roomState',x=>{state=x;render()});socket.on('gameFinished',()=>{state=null;view='home';socket.emit('getProfile');render()});socket.on('errorMessage',m=>alert(m));render();
</script></body></html>
